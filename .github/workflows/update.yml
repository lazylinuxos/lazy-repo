name: update
run-name: "Automated update of ${{ github.ref_name }} by @${{ github.actor }}"

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update-all:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/master' }}
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PULL_PUSH }}

      - uses: dcarbone/install-jq-action@v3.2.0

      - name: Discover packages
        id: pkgs
        run: |
          list=$(find srcpkgs -mindepth 2 -maxdepth 2 -type f -name update.sh \
            | sed 's|srcpkgs/\([^/]*\)/update.sh|\1|' \
            | sort)
          {
            echo "packages<<EOF"
            echo "$list"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run all updates
        run: |
          while IFS= read -r pkg; do
            echo "Updating $pkg"
            bash "srcpkgs/$pkg/update.sh"
          done <<< "${{ steps.pkgs.outputs.packages }}"

      - name: Check for updates
        id: check-updates
        run: |
          if [[ -n "$(git diff --exit-code)" ]]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new updates"
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updates
        if: ${{ steps.check-updates.outputs.has_updates == 'true' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]USERNAME@users.noreply.github.com"
          git commit --all --message "Automated update"
          
      - name: Push updates
        if: ${{ steps.check-updates.outputs.has_updates == 'true' }}
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.PULL_PUSH }}
          branch: ${{ github.ref }}